# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# Specifies the region where your App Hosting backend will be located.
# For a list of supported regions, see: https://firebase.google.com/docs/app-hosting/locations
# For example, you can change this to "asia-southeast1"
location: us-central1

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
